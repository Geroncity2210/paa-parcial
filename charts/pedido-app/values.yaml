global:
  version: "1.0.0"

  db:
    username: db_user
    password: "root"
    database: animales-db

ingress:
  host: prod.127.0.0.1.sslip.io

frontend:
  replicaCount: 2
  image:
    repository: 1jul/front-taller2
    tag: "latest"
  service:
    port: 80
  resources:
    requests:
      cpu: "25m"
      memory: "128Mi"
    limits:
      memory: "256Mi"
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10

backend:
  replicaCount: 2
  image:
    repository: 1jul/back-taller2
    tag: "1.1.0"
  service:
    port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10

  hpa:
    minReplicas: 2
    maxReplicas: 6
    cpuUtilization: 75
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

postgresql:
  primary:
    persistence:
      enabled: true
      size: 1Gi
  auth:
    #Usados por secrets.yaml
    username: db_user
    password: "root"
    #FIN Usados por secrets.yaml

    #Usados por configmap.yml
    database: animales-db
    #FIN Usados por configmap.yml

    # Esto de aquí y lo de arriba se va a utilizar para configurar el chart de posgre
    postgresPassword: "admin"
    existingSecret: "db-secret"
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: user-password
