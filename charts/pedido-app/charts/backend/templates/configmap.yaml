apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-config
  labels:
    app.kubernetes.io/name: backend-config
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  DB_HOST: "{{ .Release.Name }}-postgresql"
  DB_PORT: "5432"
  DB_NAME: "{{ .Values.postgresql.auth.database }}"