global:
  version: "1.1.0"

frontend:
  replicaCount: 1
  image:
    tag: "latest"
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"

backend:
  replicaCount: 1
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 3

postgresql:
  primary:
    persistence:
      size: 1Gi # BD pequeña en dev
  auth:
    database: animales-db-dev
